name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

env:
  JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.13-8/x64
  ANDROID_HOME: /opt/android-sdk
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true

jobs:
  # ---- Fast unit + lint gate (Phase 0 baseline) ----
  unit:
    name: Unit + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Lint (Kotlin)
        run: ./gradlew :app:assembleDebug --no-daemon -x test

      - name: Unit tests (JVM)
        run: ./gradlew testDebugUnitTest --no-daemon
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ---- Module structure sanity ----
  modules:
    name: Module Graph
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - name: Verify all 17 modules registered
        run: ./gradlew projects --no-daemon | tee modules.out && grep -c "Project " modules.out | grep -q "^17$"

  # ---- Connected device tests (Phase 1+; optional tonight) ----
