<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 2400" width="1080" height="2400">
  <defs>
    <radialGradient id="meshAurora" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#9B5CFF" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#06070F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6EFFB7"/>
      <stop offset="100%" stop-color="#9B5CFF"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="2400" fill="#06070F"/>
  <rect width="1080" height="2400" fill="url(#meshAurora)"/>
  <text x="60" y="130" fill="#F5F7FF" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="36" letter-spacing="-0.8">Reconstructing avatar</text>
  <text x="60" y="170" fill="#9FA8C7" font-family="JetBrains Mono, monospace" font-size="14">FormScan pipeline - stage 3/5: training splats</text>
  <g transform="translate(540, 1000)">
    <circle r="200" fill="none" stroke="url(#ringGrad)" stroke-width="3" stroke-dasharray="60 30" stroke-opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle r="160" fill="none" stroke="#9B5CFF" stroke-width="2" stroke-opacity="0.5"/>
    <circle r="120" fill="none" stroke="#6EFFB7" stroke-width="2" stroke-opacity="0.6" stroke-dasharray="20 10"/>
    <circle r="40" fill="#9B5CFF" fill-opacity="0.3"/>
    <circle r="8" fill="#6EFFB7"/>
  </g>
  <text x="540" y="1400" fill="#F5F7FF" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="36" text-anchor="middle">Reconstructing splats...</text>
  <text x="540" y="1460" fill="#9FA8C7" font-family="JetBrains Mono, monospace" font-size="18" text-anchor="middle">iteration 2,847 / 5,000 - ETA 2m 14s</text>
  <g transform="translate(540, 1540)">
    <rect x="-300" width="600" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.08"/>
    <rect x="-300" width="342" height="8" rx="4" fill="url(#ringGrad)"/>
  </g>
  <text x="540" y="1620" fill="#F5F7FF" fill-opacity="0.48" font-family="Inter, sans-serif" font-size="16" text-anchor="middle">57% - we will notify you when ready</text>
</svg>
