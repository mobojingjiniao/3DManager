  </defs>
  <rect width="1200" height="600" fill="#06070F"/>
  <text x="40" y="60" fill="#F5F7FF" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="32">AuroraButton variants</text>
  <text x="40" y="100" fill="#9FA8C7" font-family="Inter, sans-serif" font-weight="500" font-size="16">Filled / Tonal / Outline / Text / Destructive</text>
  <g transform="translate(40, 160)">
    <rect width="260" height="72" rx="36" fill="#6EFFB7"/>
    <text x="130" y="46" fill="#06070F" font-family="Inter, sans-serif" font-weight="700" font-size="18" text-anchor="middle">Filled (Green)</text>
  </g>
  <g transform="translate(320, 160)">
    <rect width="260" height="72" rx="36" fill="#9B5CFF"/>
    <text x="130" y="46" fill="#06070F" font-family="Inter, sans-serif" font-weight="700" font-size="18" text-anchor="middle">Filled (Violet)</text>
  </g>
  <g transform="translate(600, 160)">
    <rect width="260" height="72" rx="36" fill="url(#fabGradient)"/>
    <text x="130" y="46" fill="#06070F" font-family="Inter, sans-serif" font-weight="700" font-size="18" text-anchor="middle">Gradient (Primary)</text>
  </g>
  <g transform="translate(880, 160)">
    <rect width="260" height="72" rx="36" fill="#FFFFFF" fill-opacity="0.08"/>
