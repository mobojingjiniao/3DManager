<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <rect width="1200" height="400" fill="#06070F"/>
  <text x="40" y="60" fill="#F5F7FF" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="32">AuroraChip tones</text>
  <text x="40" y="100" fill="#9FA8C7" font-family="Inter, sans-serif" font-weight="500" font-size="16">Used for source, status, category, count</text>
  <g transform="translate(40, 160)" font-family="Inter, sans-serif" font-weight="600" font-size="14" letter-spacing="0.4">
    <g><rect width="140" height="36" rx="999" fill="#6EFFB7" fill-opacity="0.16"/><text x="70" y="24" fill="#6EFFB7" text-anchor="middle">CAPTURED</text></g>
    <g transform="translate(160, 0)"><rect width="140" height="36" rx="999" fill="#9B5CFF" fill-opacity="0.20"/><text x="70" y="24" fill="#9B5CFF" text-anchor="middle">IMPORTED</text></g>
    <g transform="translate(320, 0)"><rect width="140" height="36" rx="999" fill="#FF5BD6" fill-opacity="0.20"/><text x="70" y="24" fill="#FF5BD6" text-anchor="middle">GENERATED</text></g>
    <g transform="translate(480, 0)"><rect width="140" height="36" rx="999" fill="#7BFFCE" fill-opacity="0.20"/><text x="70" y="24" fill="#7BFFCE" text-anchor="middle">READY</text></g>
    <g transform="translate(640, 0)"><rect width="140" height="36" rx="999" fill="#FFC857" fill-opacity="0.20"/><text x="70" y="24" fill="#FFC857" text-anchor="middle">SYNCING</text></g>
    <g transform="translate(800, 0)"><rect width="140" height="36" rx="999" fill="#FF6B6B" fill-opacity="0.20"/><text x="70" y="24" fill="#FF6B6B" text-anchor="middle">FAILED</text></g>
    <g transform="translate(960, 0)"><rect width="140" height="36" rx="999" fill="#FFFFFF" fill-opacity="0.08"/><text x="70" y="24" fill="#F5F7FF" fill-opacity="0.72" text-anchor="middle">SAMPLE</text></g>
  </g>
  <g transform="translate(40, 220)" font-family="Inter, sans-serif" font-weight="600" font-size="14">
    <g><rect width="120" height="36" rx="999" fill="#6EFFB7"/><text x="60" y="24" fill="#06070F" text-anchor="middle">All</text></g>
    <g transform="translate(140, 0)"><rect width="120" height="36" rx="999" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.06"/><text x="60" y="24" fill="#F5F7FF" fill-opacity="0.72" text-anchor="middle">Captured</text></g>
    <g transform="translate(280, 0)"><rect width="120" height="36" rx="999" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.06"/><text x="60" y="24" fill="#F5F7FF" fill-opacity="0.72" text-anchor="middle">Imported</text></g>
    <g transform="translate(420, 0)"><rect width="120" height="36" rx="999" fill="#9B5CFF" fill-opacity="0.20" stroke="#9B5CFF" stroke-opacity="0.6"/><text x="60" y="24" fill="#9B5CFF" text-anchor="middle">* Favs</text></g>
  </g>
  <g transform="translate(40, 290)" font-family="JetBrains Mono, monospace" font-size="14">
    <text fill="#9FA8C7">All chips use Radius.pill (999). Height 36. Tone = semantic role, not just color.</text>
  </g>
</svg>
