      <stop offset="0%" stop-color="#6EFFB7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06070F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="auroraGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6EFFB7"/>
      <stop offset="100%" stop-color="#9B5CFF"/>
